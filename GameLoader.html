<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Burnin' Rubber 3 @Shockwave.com</title>

<style type="text/css">
* {
	margin:0;
	padding:0;
}

* img {
	border: 0;
}

body {
	font-family: Arial, Helvetica, sans-serif;
	font-size: 11px;
	font-weight: bold;
	color: #333333;
	background-color:#ffffff;
	background-image: url(/Images/ShockwaveArchiveBackground.png);
	background-repeat: no-repeat;
	background-position: center top;
	background-size: cover;
	text-align:center;
}

#wrappergame {
	width: 816px;
	margin-left: auto;
	margin-right: auto;
}

#titlegame {
	width: 816px;
	padding-top: 28px;
	padding-bottom: 4px;	
	margin-left: auto;
	margin-right: auto;
}

#game {
	text-align:center;
	margin-left: auto;
	margin-right:auto;
	border: 8px solid #fcf8f5;
}

#footer {
	margin-top: 10px;
	color:#FFFFFF;
	clear: both;
	width: 490px;
	margin-left: auto;
	margin-right: auto;
	font-size: 11px;
	font-weight: bold;
	line-height: 12px;
	text-align: center;
	border: none;
}

#colorBox {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #ffffff;
    padding: 6px;
    border-radius: 6px;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
    z-index: 9999;
}
</style>

<script>
function getDailyCode() {

    var d = new Date();

    var year = d.getFullYear().toString().substr(2,2);

    var month = d.getMonth() + 1;
    if(month < 10) month = "0" + month;

    var day = d.getDate();
    if(day < 10) day = "0" + day;

    return year + month + day;
}

window.onload = function () {

    var code = getDailyCode();

    document.getElementById("sw1param").value = code;

    var embed = document.getElementById("shockwaveEmbed");
    if(embed){
        embed.setAttribute("sw1", code);
    }
    var picker = document.getElementById("bgColorPicker");
    picker.addEventListener("input", function() {
        document.body.style.backgroundColor = this.value;
        document.body.style.backgroundImage = "none"; // entfernt das Bild
    });
};
</script>

</head>

<body>

<div id="colorBox">
    <input type="color" id="bgColorPicker" value="#ffffff">
</div>

<div style="position:absolute;top:50%;left:50%;width:640px;height:480px;margin-top:-240px;margin-left:-320px;">

<object
codebase="https://web.archive.org/web/20110316211928/http://download.macromedia.com/pub/shockwave/cabs/director/sw.cab#version=11,5,7,609"
ID="start"
width="100%"
height="100%"
VIEWASTEXT>

<param name="src" value="BurninRubber3/BR3Preloader.dcr">
<param id="sw1param" name="sw1" value="">
<param name="sw2" value="">
<param name="sw3" value="">
<param name="sw8" value="0">
<param name="sw9" value="burninrubber3">

<param name="swRemote"
value="swSaveEnabled='true' swVolume='true' swRestart='true' swPausePlay='true' swFastForward='true' swContextMenu='true' ">

<param name="swStretchStyle" value="stage">
<param name="bgColor" value="#000000">
<param name="swStretchHAlign" value="Left">
<param name="swStretchVAlign" value="Top">

<embed
id="shockwaveEmbed"
src="BurninRubber3/BR3Preloader.dcr"
PlayerVersion="11.5"
bgColor="#000000"
swStretchHAlign="Left"
swStretchVAlign="Top"
width="100%"
height="100%"
swRemote="swSaveEnabled='true' swVolume='true' swRestart='true' swPausePlay='true' swFastForward='true' swContextMenu='true'"
swStretchStyle="stage"
type="application/x-director"
pluginspage="https://web.archive.org/web/20110317175329/http://www.macromedia.com/shockwave/download/index.cgi?P1_Prod_Version=ShockwaveDirector"
sw1=""
sw2=""
sw3="">
</embed>

</object>

</div>

</body>
</html>
